name: Keep Alive — Render

on:
  schedule:
    # Toutes les 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mcplanning-back.onrender.com/api)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend responded with $STATUS"
          fi
